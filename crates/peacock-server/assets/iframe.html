<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>peacock report</title>
<style>
  /* Local look, themed via the injected --pk-* tokens (fallbacks = stock). */
  :root { --ink:#201f1e; --soft:#605e5c; --line:#e1dfdd; --accent:#0f6cbd; --font:"Segoe UI",system-ui,sans-serif; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:var(--pk-font, var(--font)); color:var(--pk-ink, var(--ink)); background:#fff; }
  .wrap { padding:14px; }
  .head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .head .t { font-weight:600; font-size:15px; }
  .head .sub { font-size:12px; color:var(--soft); }
  .kpis { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .kpi { flex:1; min-width:120px; background:#f4f9fe; border:1px solid #e4eef8; border-radius:10px; padding:10px 12px; }
  .kpi .l { font-size:11px; color:var(--soft); text-transform:uppercase; letter-spacing:.4px; }
  .kpi .v { font-size:22px; font-weight:700; color:var(--pk-accent, var(--accent)); }
  img { width:100%; height:auto; border-radius:8px; display:block; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .chip { font-size:12px; padding:5px 11px; border-radius:999px; cursor:pointer; border:1px solid var(--line); background:#fff; }
  .chip.on { background:var(--pk-accent, var(--accent)); color:#fff; border-color:var(--pk-accent, var(--accent)); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th,td { text-align:left; padding:6px 9px; border-bottom:1px solid var(--line); }
  td.num,th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .muted { color:var(--soft); font-size:12px; }
  /* Instance-report components (facts / markdown / timeline). */
  .facts { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; margin-bottom:12px; }
  .fact { background:#f7f6f5; border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .fact .k { font-size:11px; color:var(--soft); text-transform:uppercase; letter-spacing:.4px; }
  .fact .w { font-size:14px; font-weight:600; overflow-wrap:anywhere; }
  .md { font-size:13.5px; line-height:1.55; margin-bottom:12px; }
  .md h3 { margin:.6em 0 .3em; font-size:15px; }
  .md ul { margin:.3em 0 .6em 1.2em; padding:0; }
  .md .link { color:var(--pk-accent, var(--accent)); font-weight:600; }
  .md .wl { cursor:pointer; text-decoration:underline; text-decoration-style:dotted; }
  .actions { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .act { font-size:12px; padding:6px 12px; border-radius:999px; cursor:pointer;
         border:1px solid var(--pk-accent, var(--accent)); background:#fff;
         color:var(--pk-accent, var(--accent)); font-weight:600; }
  .act.done { opacity:.65; cursor:default; }
  .act.err { border-color:#a4262c; color:#a4262c; }
  .tl { border-left:2px solid var(--pk-accent, var(--accent)); margin:4px 0 12px 6px; padding-left:12px; }
  .tl .ev { margin-bottom:10px; }
  .tl .ev .tt { font-weight:600; font-size:13px; }
  .tl .ev .meta { font-size:11px; color:var(--soft); }
  .tl .ev .bd { font-size:12.5px; white-space:pre-wrap; overflow-wrap:anywhere; }
</style>
<style id="pk-theme">__THEME_CSS__</style>
<script type="application/json" id="pk-init">__INITIAL_PARAMS__</script>
</head>
<body>
  <div class="wrap" id="app"><div class="muted">Loading report…</div></div>
<script>
// The MCP-Apps iframe runtime. Renders a peacock report and routes committed
// drills back to the host via callServerTool (re-render) + updateModelContext
// (compact view-state). Falls back to peacock's own HTTP endpoint when opened
// standalone (no MCP host), so the resource is independently verifiable.
const REPORT_ID = "__REPORT_ID__";
// The caller's params, minted into the ui:// URI by the tool result — the
// FIRST render of a param-required report depends on them; drills then
// accrue on top.
const INITIAL_PARAMS = (() => {
  try { return JSON.parse(document.getElementById("pk-init").textContent) || {}; }
  catch (_) { return {}; }
})();
const money = n => "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
// The document currently shown (the `document` pseudo-report's identity);
// wikilink navigation retargets it. Null for plain row/instance reports.
let doc = REPORT_ID === "document" ? { skill: INITIAL_PARAMS.skill, id: INITIAL_PARAMS.id } : null;
// A slug, exactly as the server enforces — only slug-shaped wikilink
// segments become navigable.
const isSlug = s => typeof s === "string" && /^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$/.test(s) && !s.includes("..");
// EVERY dynamic string is escaped before it touches innerHTML — instance
// bodies, facts and event titles are agent-/user-authored content.
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const titleize = k => esc(k).replace(/[-_]+/g, " ").replace(/\b\w/g, c => c.toUpperCase());
let params = { ...INITIAL_PARAMS };

// Markdown, escape-then-format: the WHOLE line is escaped first, then a few
// line-level transforms build structure. No raw HTML ever passes through.
function mdToHtml(md) {
  const out = [];
  let list = false, para = [];
  const flushPara = () => { if (para.length) { out.push(`<p>${para.join(" ")}</p>`); para = []; } };
  const flushList = () => { if (list) { out.push("</ul>"); list = false; } };
  for (const raw of String(md ?? "").split("\n")) {
    // `[[skill::id]]` with slug-shaped segments becomes a navigable link to
    // that document; any other wikilink stays a styled, inert span. The
    // segments were escaped with the whole line and re-checked as slugs, so
    // nothing attribute-breaking can ride data-skill/data-id.
    const line = esc(raw.trim()).replace(/\[\[([^\]]+)\]\]/g, (_, inner) => {
      const sep = inner.indexOf("::");
      if (sep > 0) {
        const s = inner.slice(0, sep), i = inner.slice(sep + 2);
        if (isSlug(s) && isSlug(i))
          return `<span class="link wl" data-skill="${s}" data-id="${i}">${inner}</span>`;
      }
      return `<span class="link">${inner}</span>`;
    });
    if (!line) { flushPara(); flushList(); continue; }
    if (line.startsWith("# ") || line.startsWith("## ") || line.startsWith("### ")) {
      flushPara(); flushList();
      out.push(`<h3>${line.replace(/^#+\s*/, "")}</h3>`);
    } else if (line.startsWith("- ")) {
      flushPara();
      if (!list) { out.push("<ul>"); list = true; }
      out.push(`<li>${line.slice(2)}</li>`);
    } else {
      flushList(); para.push(line);
    }
  }
  flushPara(); flushList();
  return out.join("");
}

// MCP-Apps host bridge (postMessage). When embedded, the host fulfils these.
function callServerTool(name, args) {
  return new Promise((resolve, reject) => {
    if (window.parent === window) {
      // standalone: call peacock directly — render via the HTTP endpoint,
      // any other tool via peacock's own /mcp (same origin).
      if (name === "render_report") {
        fetch("/v1/render_report", { method:"POST", headers:{ "content-type":"application/json" },
          body: JSON.stringify({ report_id: args.report_id, params: args.params, png: true }) })
          .then(r => r.json()).then(resolve, reject);
      } else {
        fetch("/mcp", { method:"POST", headers:{ "content-type":"application/json" },
          body: JSON.stringify({ jsonrpc:"2.0", id:1, method:"tools/call",
                                 params:{ name, arguments: args } }) })
          .then(r => r.json()).then(j => resolve(j.error ? j : j.result), reject);
      }
      return;
    }
    const reqId = "r" + Math.random().toString(36).slice(2);
    const onMsg = e => {
      if (e.data && e.data.type === "mcp:callServerTool:result" && e.data.reqId === reqId) {
        window.removeEventListener("message", onMsg); resolve(e.data.result);
      }
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type:"mcp:callServerTool", reqId, name, arguments: args }, "*");
  });
}
function updateModelContext(record) {
  if (window.parent !== window)
    window.parent.postMessage({ type:"mcp:updateModelContext", record }, "*");
}
// A `prompt` document action: hand the prepared text to the host, which
// sends it as a NEW USER TURN in the chat. Standalone (no host) it is a
// no-op — the button is disabled there.
function sendPrompt(text) {
  if (window.parent !== window)
    window.parent.postMessage({ type:"mcp:prompt", text }, "*");
}

// Navigate to another document: a fresh `document` render (drill pattern —
// absolute params, DOM swap) + a compact view-state record for the model.
async function openDoc(skill, id) {
  doc = { skill, id };
  const data = await callServerTool("render_report",
    { report_id: "document", params: { skill, id } });
  render(data);
  updateModelContext({ report_id: "document", params: { skill, id },
                       salient_summary: `viewing ${skill}::${id}` });
}

// One instance alias → facts grid + markdown + timeline (whatever the report
// composed for it). All content escaped (agent-/user-authored).
function instanceHtml(alias, inst) {
  const facts = (inst.facts || []).map(f =>
    `<div class="fact"><div class="k">${titleize(f.key)}</div><div class="w">${esc(
      typeof f.value === "string" ? f.value : JSON.stringify(f.value))}</div></div>`).join("");
  const events = inst.events === undefined ? "" : (inst.events.length
    ? `<div class="tl">${inst.events.map(e =>
        `<div class="ev"><div class="tt">${esc(e.title)}</div>
         <div class="meta">${esc(e.label)}${e.at ? " · " + esc(e.at) : ""} · ${esc(e.source)}</div>
         <div class="bd">${esc(e.body)}</div></div>`).join("")}</div>`
    : `<div class="muted">No activity yet.</div>`);
  return `
    <div class="head"><div><div class="t">${titleize(inst.id || alias)}</div>
      <div class="sub">${esc(inst.skill || "")} · live from escurel</div></div></div>
    ${facts ? `<div class="facts">${facts}</div>` : ""}
    ${inst.markdown ? `<div class="md">${mdToHtml(inst.markdown)}</div>` : ""}
    ${events}`;
}

function render(data) {
  // A failed render is SHOWN, never swallowed into the empty state — the
  // JSON-RPC error message (bad params, ACL denial) is the useful signal.
  const renderError = data && (data.error || (data.isError === true && data.content));
  if (renderError) {
    const msg = typeof data.error === "string" ? data.error
      : (data.error && (data.error.message || JSON.stringify(data.error)))
        || (Array.isArray(data.content) && data.content[0] && data.content[0].text)
        || "render failed";
    document.getElementById("app").innerHTML =
      `<div class="head"><div class="t">Couldn\u2019t render ${esc(REPORT_ID)}</div></div>
       <div class="muted" style="white-space:pre-wrap">${esc(msg)}</div>`;
    return;
  }
  const sc = (data && data.structuredContent) || data || {};
  const rows = sc.rows || [];
  params = sc.current_params || params;
  const schema = sc.param_schema || {};
  const png = (data && data._meta && data._meta.png_base64) || sc.png_base64;

  const parts = [];

  // Instance report: the record(s) the report composed (facts/markdown/timeline).
  for (const [alias, inst] of Object.entries(sc.instances || {}))
    parts.push(instanceHtml(alias, inst));

  // Document actions: the affordances the target's SKILL page declares
  // (`actions:` frontmatter, substituted server-side). Prompt actions need
  // a host chat (disabled standalone); event actions round-trip through
  // `emit_document_event`.
  const docActions = (sc.document && sc.document.actions) || [];
  if (sc.document) doc = { skill: sc.document.skill, id: sc.document.id };
  if (docActions.length) {
    const standalone = window.parent === window;
    parts.push(`<div class="actions">${docActions.map((a, i) => {
      const off = a.kind === "prompt" && standalone;
      return `<span class="act${off ? " done" : ""}" data-act="${i}"${off ? ' title="needs a chat host"' : ""}>${esc(a.label)}</span>`;
    }).join("")}</div>`);
  }

  // Row report: KPI + chart + drill chips + table. The drill chips exist
  // ONLY when the report DECLARES a `category` param (param_schema-driven —
  // a report without the dimension must not invite a drill it would reject).
  if (rows.length) {
    const cols = rows.length ? Object.keys(rows[0]) : [];
    const numeric = [...cols].reverse().find(c => rows.some(r => typeof r[c] === "number")) || "";
    const total = rows.reduce((a,r)=>a+(+r[numeric]||0),0);
    const scope = params.category && params.category!=="ALL" ? params.category : "";
    const canDrill = !!schema.category;
    const cats = ["ALL", ...new Set(rows.map(r=>r.category).filter(Boolean))];
    parts.push(`
      <div class="head"><div><div class="t">${titleize(REPORT_ID)}</div>
        <div class="sub">${esc(scope || "live from escurel")}</div></div></div>
      <div class="kpis">
        <div class="kpi"><div class="l">Total ${esc(numeric || "value")}</div><div class="v">${money(total)}</div></div>
        <div class="kpi"><div class="l">Rows</div><div class="v" style="color:#201f1e">${rows.length}</div></div>
      </div>
      ${png ? `<img alt="chart" src="data:image/png;base64,${png}">` : ""}
      ${canDrill ? `<div class="chips">${cats.map(c=>`<span class="chip ${(params.category||'ALL')===c?'on':''}" data-cat="${esc(c)}">${esc(c==='ALL'?'All':c)}</span>`).join("")}</div>` : ""}
      <table><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>
        ${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(typeof r[c]==="number"?(+r[c]).toLocaleString("en-US"):r[c])}</td>`).join("")}</tr>`).join("")}</table>`);
  } else if (!parts.length) {
    parts.push(`<div class="muted">Nothing to show.</div>`);
  }

  document.getElementById("app").innerHTML = parts.join("");
  document.querySelectorAll(".chip").forEach(ch => ch.onclick = () => drill(ch.dataset.cat));
  // Wikilink navigation: any `[[skill::id]]` in a rendered body opens that
  // document in place (a fresh absolute render, like a drill).
  document.querySelectorAll(".wl").forEach(w =>
    w.onclick = () => openDoc(w.dataset.skill, w.dataset.id));
  // Document action chips.
  document.querySelectorAll(".act").forEach(el => el.onclick = async () => {
    if (el.classList.contains("done")) return;
    const a = docActions[+el.dataset.act];
    if (!a) return;
    if (a.kind === "prompt") { sendPrompt(a.prompt || ""); return; }
    // kind === "event": capture in escurel via the server-validated tool.
    el.classList.add("done");
    const was = el.textContent;
    el.textContent = "…";
    try {
      const r = await callServerTool("emit_document_event",
        { skill: doc.skill, id: doc.id, action: a.name });
      const err = r && (r.error || (r.result && r.result.error));
      if (err) throw new Error(typeof err === "string" ? err : (err.message || JSON.stringify(err)));
      el.textContent = `✓ ${was}`;
    } catch (e) {
      el.classList.remove("done"); el.classList.add("err");
      el.textContent = `${was} — ${String(e && e.message || e).slice(0, 120)}`;
    }
  });
}

async function drill(cat) {
  const next = { ...params, category: cat };
  const data = await callServerTool("render_report", { report_id: REPORT_ID, params: next });
  render(data);
  // committed selection → push compact view-state to the model (FR-X-3)
  const rows = (data.structuredContent||data).rows || [];
  const total = rows.reduce((a,r)=>a+(+r.revenue||0),0);
  updateModelContext({ report_id: REPORT_ID, params: (data.structuredContent||data).current_params,
                       salient_summary: `${cat==='ALL'?'All categories':cat}: ${money(total)} (1997)` });
}

callServerTool("render_report", { report_id: REPORT_ID, params }).then(render)
  .catch(e => document.getElementById("app").innerHTML = `<div class="muted">Couldn't load: ${esc(e)}</div>`);
</script>
</body>
</html>
