name: CI

# The correctness gate: fmt + clippy + test + build on Linux, on every PR and
# every push to main / release tag — mirroring escurel's and triton's CI.
#
# peacock path-depends on its siblings **escurel** and **triton**, so CI checks
# them out next to peacock and builds the `triton` binary the consumer
# integration tests spawn. The Flutter-web client is built as a separate step.
# Cross-platform RELEASE binaries live in release.yml (v* tags only).
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short
  # The no-mock tests statically link libduckdb (via escurel-test-support) into
  # many test binaries; full debuginfo + parallel linking blows past the runner
  # memory budget. Drop test/dev debuginfo and serialise build jobs (escurel's
  # fix). CI-only; committed profiles and local dev builds are untouched.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_BUILD_JOBS: "1"
  # The no-mock tests pull libduckdb transitively via escurel-test-support;
  # download the precompiled libduckdb (~2-3 min) instead of compiling from
  # source (~20-30 min), as escurel does. CI-only — local builds are untouched.
  DUCKDB_DOWNLOAD_LIB: "1"

jobs:
  ci:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout peacock
        uses: actions/checkout@v4
        with:
          path: peacock

      - name: Checkout escurel (path dep)
        uses: actions/checkout@v4
        with:
          repository: DataZooDE/escurel
          path: escurel
          token: ${{ secrets.DATAZOO_CI_TOKEN }}

      - name: Checkout triton (path dep)
        uses: actions/checkout@v4
        with:
          repository: DataZooDE/triton
          path: triton
          token: ${{ secrets.DATAZOO_CI_TOKEN }}

      # rust-toolchain.toml (in peacock/) pins the channel + components.
      - name: Install Rust toolchain
        working-directory: peacock
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: peacock
          shared-key: peacock-duckdb-dl
          # The libduckdb-sys build script downloads libduckdb here and bakes
          # its path into the cached link-search output; cache it explicitly.
          cache-directories: peacock/target/duckdb-download
          cache-on-failure: true

      # The consumer integration tests spawn the real `triton` binary; the
      # harness walks up from triton/crates/triton-tests to target/debug/triton.
      - name: Build triton binary
        working-directory: triton
        run: cargo build --bin triton

      - name: cargo fmt --check
        working-directory: peacock
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: peacock
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        working-directory: peacock
        run: cargo test --workspace --all-targets

      - name: cargo build --release
        working-directory: peacock
        run: cargo build --workspace --release

  flutter:
    name: flutter-web build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build the peacock-web bundle
        working-directory: web/peacock-web
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --release --base-href /app/
